name: Deploy Blazor WebAssembly

on:
  push:
    branches:
      - master

jobs:

  build_and_deploy:

    runs-on: ubuntu-latest

    steps:

      # Download repository
      - name: Checkout
        uses: actions/checkout@v4


      # Install .NET 10
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"


      # Create the Blazor publish files
      - name: Publish Blazor App
        run: |
          dotnet publish \
          ./WeatherSamplerBlazorApp/WeatherSamplerBlazorApp.csproj \
          -c Release \
          -o publish


      # Make sure Azure will receive _framework
      - name: Verify Publish
        run: |
          echo "Contents of publish:"
          ls publish

          echo "Contents of wwwroot:"
          ls publish/wwwroot

          echo "Blazor framework:"
          ls publish/wwwroot/_framework


      # Upload already-built files to Azure
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:

          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_CLIFF_0C8F06410 }}

          action: upload

          app_location: "publish"

          output_location: "wwwroot"

          skip_app_build: true
